<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f4f8;">
    <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center;">
        <h2 style="color:#003366;">تسجيل الدخول</h2>
        {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="اسم المستخدم" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit" class="btn btn-primary" style="margin-top: 15px;">دخول</button>
        </form>
    </div>
</body>
</html>
