<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - نظام المبيعات الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            margin: 0;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
        }

        .register-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 380px;
            text-align: center;
            transition: all 0.4s ease;
        }

        .register-container:hover {
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            transform: translateY(-5px);
        }

        .register-header h2 {
            color: #ffffff;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .register-header p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: 0.3s;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 14px 45px 14px 15px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            appearance: none; /* إخفاء سهم السيلكت الافتراضي لتخصيصه */
        }

        /* سهم السيلكت المخصص */
        .select-group::after {
            content: "\f0d7";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            pointer-events: none;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #00aaff;
            box-shadow: 0 0 10px rgba(0, 170, 255, 0.25);
            background: rgba(15, 23, 42, 0.8);
        }

        .input-group input:focus + i, .input-group select:focus + i {
            color: #00aaff;
        }

        /* خيارات القائمة المنسدلة باللون الداكن */
        .input-group select option {
            background-color: #1e293b;
            color: white;
        }

        .btn-submit {
            background: linear-gradient(135deg, #00aaff, #0077cc);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 170, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 170, 255, 0.4);
            filter: brightness(1.1);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: right;
            align-items: center;
            gap: 8px;
        }

        .alert-success {
            background: rgba(39, 174, 96, 0.15);
            border: 1px solid rgba(39, 174, 96, 0.3);
            color: #2ecc71;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: right;
            align-items: center;
            gap: 8px;
        }

        .login-link {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .login-link a {
            color: #00aaff;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h2>إنشاء حساب جديد</h2>
            <p>سجل حسابك للوصول لنظام المبيعات</p>
        </div>

        <!-- صندوق التنبيه بالأخطاء -->
        <div id="errorAlert" class="alert-error">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorMessage"></span>
        </div>

        <!-- صندوق التنبيه بالنجاح -->
        <div id="successAlert" class="alert-success">
            <i class="fa-solid fa-circle-check"></i>
            <span id="successMessage"></span>
        </div>

        <form id="registerForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="اسم المستخدم الجديد" required>
                <i class="fa-solid fa-user"></i>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="كلمة المرور" required>
                <i class="fa-solid fa-lock"></i>
            </div>
            
            <div class="input-group select-group">
                <select id="role" required>
                    <option value="entry">مدخل بيانات (إضافة فواتير فقط)</option>
                    <option value="admin">مدير النظام (صلاحيات كاملة)</option>
                </select>
                <i class="fa-solid fa-user-shield"></i>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="spinner" id="btnSpinner"></span>
                <span id="btnText">تسجيل حساب جديد</span>
            </button>
        </form>

        <div class="login-link">
            لديك حساب بالفعل؟ <a href="{{ url_for('login_page') }}">تسجيل الدخول</a>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');
        const successAlert = document.getElementById('successAlert');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');
        const btnSpinner = document.getElementById('btnSpinner');
        const btnText = document.getElementById('btnText');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
            btnSpinner.style.display = 'inline-block';
            btnText.innerText = 'جاري التسجيل...';
            submitBtn.disabled = true;

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            try {
                // الاتصال بـ API تسجيل الحسابات (API Swagger)
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password, role })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    successMessage.innerText = data.message || 'تم تسجيل الحساب بنجاح!';
                    successAlert.style.display = 'flex';
                    registerForm.reset();
                    
                    // توجيه لصفحة تسجيل الدخول بعد 2 ثانية
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showError(data.message || 'فشل التسجيل. يرجى التحقق من البيانات.');
                }
            } catch (err) {
                showError('حدث خطأ في الاتصال بالخادم. يرجى المحاولة لاحقاً.');
                console.error(err);
            } finally {
                btnSpinner.style.display = 'none';
                btnText.innerText = 'تسجيل حساب جديد';
                submitBtn.disabled = false;
            }
        });

        function showError(message) {
            errorMessage.innerText = message;
            errorAlert.style.display = 'flex';
        }
    </script>
</body>
</html>
